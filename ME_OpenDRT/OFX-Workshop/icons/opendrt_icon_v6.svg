<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1822"/>
      <stop offset="100%" stop-color="#060c12"/>
    </radialGradient>

    <radialGradient id="lensGrad" cx="40%" cy="38%" r="60%">
      <stop offset="0%"   stop-color="#c8e8ff"/>
      <stop offset="40%"  stop-color="#4488cc"/>
      <stop offset="100%" stop-color="#1a3a5a"/>
    </radialGradient>

    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4488cc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c8dff0" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d8eeff"/>
      <stop offset="100%" stop-color="#2a4a6a"/>
    </linearGradient>

    <filter id="beamBlur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="lensGlow" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="screenGlow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" ry="88" fill="url(#bg)"/>

  <!-- ===================== -->
  <!-- PROJECTOR — top zone: y 48–230, centered x=256 -->
  <!-- Body: 280px wide, 72px tall, centered -->
  <!-- x: 256-140=116 to 256+140=396, y: 80 to 152 -->
  <!-- Lens on right end at x=396, y=116 (center of body) -->
  <!-- Beam goes right from lens to screen at x=470 -->
  <!-- ===================== -->

  <!-- BEAM -->
  <polygon
    points="406,110  468,78  468,154  406,122"
    fill="url(#beamGrad)"
    filter="url(#beamBlur)"
  />

  <!-- SCREEN -->
  <rect x="464" y="72" width="16" height="88" rx="3" fill="url(#screenGrad)" filter="url(#screenGlow)"/>

  <!-- BODY -->
  <rect x="116" y="80" width="284" height="72" rx="12" fill="#111e2c" stroke="#1e3a54" stroke-width="2"/>
  <!-- top highlight strip -->
  <rect x="116" y="80" width="284" height="5" rx="4" fill="#243c56" opacity="0.7"/>

  <!-- Vents -->
  <line x1="148" y1="98" x2="148" y2="144" stroke="#0a1620" stroke-width="4" stroke-linecap="round"/>
  <line x1="164" y1="98" x2="164" y2="144" stroke="#0a1620" stroke-width="4" stroke-linecap="round"/>
  <line x1="180" y1="98" x2="180" y2="144" stroke="#0a1620" stroke-width="4" stroke-linecap="round"/>

  <!-- Indicator light -->
  <circle cx="230" cy="93" r="5" fill="#1a5a30"/>
  <circle cx="230" cy="93" r="3" fill="#22ee66" opacity="0.9"/>

  <!-- Lens housing -->
  <circle cx="388" cy="116" r="40" fill="#0c1820" stroke="#1e3a54" stroke-width="2"/>
  <circle cx="388" cy="116" r="31" fill="#0a1420" stroke="#162436" stroke-width="1.5"/>
  <!-- Lens -->
  <circle cx="388" cy="116" r="23" fill="url(#lensGrad)" filter="url(#lensGlow)"/>
  <!-- Specular -->
  <ellipse cx="381" cy="109" rx="8" ry="5" fill="white" opacity="0.15" transform="rotate(-20,381,109)"/>
  <ellipse cx="379" cy="107" rx="3" ry="2" fill="white" opacity="0.28" transform="rotate(-20,379,107)"/>

  <!-- Tripod legs — small, underneath body -->
  <line x1="200" y1="152" x2="180" y2="210" stroke="#1a3050" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="152" x2="256" y2="216" stroke="#1a3050" stroke-width="3" stroke-linecap="round"/>
  <line x1="312" y1="152" x2="332" y2="210" stroke="#1a3050" stroke-width="3" stroke-linecap="round"/>

  <!-- ===================== -->
  <!-- TEXT — bottom zone: y 230–490 -->
  <!-- "OPEN" small, "DRT" massive -->
  <!-- ===================== -->

  <text
    x="256" y="330"
    font-family="'SF Mono', 'Courier New', monospace"
    font-size="72"
    font-weight="700"
    fill="#9ec8e8"
    text-anchor="middle"
    letter-spacing="8"
    filter="url(#textGlow)"
  >OPEN</text>

  <text
    x="256" y="460"
    font-family="'SF Mono', 'Courier New', monospace"
    font-size="148"
    font-weight="700"
    fill="#9ec8e8"
    text-anchor="middle"
    letter-spacing="2"
    filter="url(#textGlow)"
  >DRT</text>

</svg>
