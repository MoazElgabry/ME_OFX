name: Build ME_OpenDRT macOS (arm64 + x86_64) and Linux CUDA

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS ${{ matrix.variant.label }}
    runs-on: ${{ matrix.variant.runner }}
    env:
      OPENDRT_VERSION: v1.2.9c
    strategy:
      fail-fast: false
      matrix:
        variant:
          - label: arm64
            arch: arm64
            runner: macos-14
            zip_name: ME_OpenDRT_v1.2.9c_macOS_arm64_portable.zip
            artifact_name: ME_OpenDRT-v1.2.9c-macos-arm64
          - label: x86_64
            arch: x86_64
            runner: macos-15-intel
            zip_name: ME_OpenDRT_v1.2.9c_macOS_x86_64_portable.zip
            artifact_name: ME_OpenDRT-v1.2.9c-macos-x86_64
    defaults:
      run:
        shell: bash
        working-directory: ME_OpenDRT/source
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: |
          cmake -S . -B build-mac -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.variant.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DME_OPENDRT_BUILD_CUBE_VIEWER_STUB=ON \
            -DME_OPENDRT_VIEWER_FORCE_BUNDLED_GLFW=ON
      - name: Build
        run: cmake --build build-mac --config Release
      - name: Verify bundle
        run: |
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT.ofx
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT_CubeViewer
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/Resources/OpenDRT.metallib
      - name: Package
        run: |
          cd bundle
          zip -r "../${{ matrix.variant.zip_name }}" ME_OpenDRT.ofx.bundle
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant.artifact_name }}
          path: ME_OpenDRT/source/${{ matrix.variant.zip_name }}

  build-linux-cuda:
    name: Linux CUDA
    runs-on: ubuntu-22.04
    env:
      OPENDRT_VERSION: v1.2.9c
    defaults:
      run:
        shell: bash
        working-directory: ME_OpenDRT/source
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libglfw3-dev libx11-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libxxf86vm-dev libgl1-mesa-dev
      - name: Configure
        run: |
          cmake -S . -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DME_OPENDRT_LINUX_CUDA=ON \
            -DME_OPENDRT_BUILD_CUBE_VIEWER_STUB=ON \
            -DME_OPENDRT_VIEWER_FORCE_BUNDLED_GLFW=ON
      - name: Build
        run: cmake --build build-linux --config Release -j
      - name: Verify bundle
        run: |
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/Linux-x86-64/ME_OpenDRT.ofx
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/Linux-x86-64/ME_OpenDRT_CubeViewer
          chmod +x bundle/ME_OpenDRT.ofx.bundle/Contents/Linux-x86-64/ME_OpenDRT_CubeViewer
      - name: Package
        run: |
          tar -C bundle -czf ../ME_OpenDRT_v1.2.9c_linux_x86_64_cuda_opencl_cpu_portable.tar.gz ME_OpenDRT.ofx.bundle
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ME_OpenDRT-v1.2.9c-linux-x86_64-cuda-opencl-cpu
          path: ME_OpenDRT/source/ME_OpenDRT_v1.2.9c_linux_x86_64_cuda_opencl_cpu_portable.tar.gz
